<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Pronostici probabilistici per i Big Five e le competizioni UEFA basati su xG, forma, Elo e rendimento casa/trasferta." />
  <title>European Match Predictor</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="global.css" />
  <link rel="stylesheet" href="europe.css" />
  <link rel="stylesheet" href="team-logos.css" />
  <link rel="stylesheet" href="fixture-modal.css" />
  <link rel="stylesheet" href="fixture-modal-redesign.css" />
</head>
<body>
  <div id="global-announcement" class="global-announcement" hidden></div>

  <section id="league-picker" class="league-picker" role="dialog" aria-modal="true" aria-labelledby="league-picker-title" aria-describedby="league-picker-description" hidden>
    <div class="league-picker__panel">
      <div class="league-picker__heading">
        <div>
          <span class="league-picker__eyebrow">COMPETIZIONI</span>
          <h1 id="league-picker-title">Cambia competizione</h1>
          <p id="league-picker-description">Caricamento…</p>
        </div>
        <button id="close-league-picker" class="icon-button league-picker__close" type="button" aria-label="Chiudi selezione competizione">×</button>
      </div>
      <div id="league-picker-grid" class="league-picker__grid"></div>
    </div>
  </section>

  <main class="page-shell page-shell--predictor">
    <section class="control-bar control-bar--europe" aria-label="Selezione pronostici">
      <div class="select-wrap select-wrap--competition">
        <label class="sr-only" for="competition-select">Competizione</label>
        <span id="competition-logo" class="competition-select-logo" aria-hidden="true"></span>
        <select id="competition-select" aria-label="Competizione"></select>
        <span class="select-caret" aria-hidden="true">⌄</span>
      </div>

      <div class="select-wrap">
        <label class="sr-only" for="matchday-select">Turno</label>
        <select id="matchday-select" aria-label="Turno"></select>
        <span class="select-caret" aria-hidden="true">⌄</span>
      </div>

      <div class="select-wrap">
        <label class="sr-only" for="favorite-team-select">Squadra evidenziata</label>
        <select id="favorite-team-select" aria-label="Squadra evidenziata"></select>
        <span class="select-caret" aria-hidden="true">⌄</span>
      </div>

      <button id="predict-button" class="primary-button" type="button">
        <span>Calcola</span>
        <span aria-hidden="true">→</span>
      </button>

      <div class="control-links">
        <button id="open-league-picker" class="icon-button" type="button" aria-label="Scelta rapida competizione" title="Scelta rapida competizione">🏆</button>
        <a class="icon-button" href="settings.html" aria-label="Impostazioni personali" title="Impostazioni personali">⚙</a>
        <a class="icon-button" href="admin.html" aria-label="Amministrazione" title="Amministrazione">🔐</a>
      </div>
      <p id="error-message" class="error" role="alert" hidden></p>
    </section>

    <section id="results" class="results" aria-live="polite" hidden>
      <div id="fixtures-grid" class="fixtures-grid"></div>
    </section>
  </main>

  <section id="fixture-modal" class="fixture-modal" role="dialog" aria-modal="true" aria-labelledby="fixture-modal-title" hidden>
    <div id="fixture-modal-panel" class="fixture-modal__panel" tabindex="-1">
      <div id="fixture-modal-content"></div>
    </div>
  </section>

  <script type="module" src="data-fetch-cache.js"></script>
  <script type="module" src="competition-preference.js"></script>
  <script type="module" src="app.js"></script>
  <script type="module" src="fixture-modal-enhancements.js"></script>
  <script type="module" src="all-team-crests.js"></script>
  <script type="module" src="league-picker.js"></script>
</body>
</html>
