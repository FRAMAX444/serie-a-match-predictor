<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Pronostici probabilistici della Serie A 2026/27 per giornata." />
  <title>Serie A Predictor</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="global-announcement" class="global-announcement" hidden></div>
  <main class="page-shell page-shell--predictor">
    <section class="control-bar" aria-label="Selezione pronostici">
      <div class="select-wrap">
        <label class="sr-only" for="matchday-select">Giornata</label>
        <select id="matchday-select" aria-label="Giornata"></select>
        <span aria-hidden="true">⌄</span>
      </div>

      <div class="select-wrap">
        <label class="sr-only" for="favorite-team-select">Squadra preferita</label>
        <select id="favorite-team-select" aria-label="Squadra preferita"></select>
        <span aria-hidden="true">⌄</span>
      </div>

      <button id="predict-button" class="primary-button" type="button">
        <span>Calcola</span>
        <span aria-hidden="true">→</span>
      </button>

      <div class="control-links">
        <a class="icon-button" href="settings.html" aria-label="Impostazioni personali" title="Impostazioni personali">⚙</a>
        <a class="icon-button" href="admin.html" aria-label="Amministrazione" title="Amministrazione">🔐</a>
      </div>
      <p id="error-message" class="error" role="alert" hidden></p>
    </section>

    <section id="results" class="results" aria-live="polite" hidden>
      <div id="fixtures-grid" class="fixtures-grid"></div>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
