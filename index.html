<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Pronostici probabilistici della Serie A 2026/27 per giornata." />
  <title>Serie A Predictor</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page-shell">
    <section class="page-heading">
      <h1>Pronostici per giornata</h1>
    </section>

    <section class="filters-card" aria-label="Selezione pronostici">
      <div class="field">
        <label for="matchday-select">Giornata</label>
        <div class="select-wrap">
          <select id="matchday-select" aria-describedby="selected-round-summary"></select>
          <span aria-hidden="true">⌄</span>
        </div>
        <small id="selected-round-summary">—</small>
      </div>

      <div class="field">
        <label for="favorite-team-select">Squadra preferita</label>
        <div class="select-wrap">
          <select id="favorite-team-select"></select>
          <span aria-hidden="true">⌄</span>
        </div>
        <small>La palette segue automaticamente i colori della squadra</small>
      </div>

      <button id="predict-button" class="primary-button" type="button">
        <span>Calcola pronostici</span>
        <span aria-hidden="true">→</span>
      </button>

      <details class="model-settings">
        <summary>Impostazioni modello</summary>
        <div class="settings-grid">
          <label>
            <span>Finestra dati</span>
            <select id="window-days">
              <option value="365">12 mesi</option>
              <option value="540" selected>18 mesi</option>
              <option value="730">24 mesi</option>
            </select>
          </label>
          <label>
            <span>Recenza</span>
            <select id="half-life">
              <option value="75">75 giorni</option>
              <option value="120" selected>120 giorni</option>
              <option value="180">180 giorni</option>
            </select>
          </label>
        </div>
      </details>

      <details class="customization-settings">
        <summary>Personalizzazione grafica</summary>
        <div class="customization-grid">
          <label class="color-control">
            <span>Colore principale</span>
            <input id="primary-color" type="color" value="#1f4f8f" />
          </label>
          <label class="color-control">
            <span>Colore secondario</span>
            <input id="secondary-color" type="color" value="#172033" />
          </label>
          <label class="background-control">
            <span>Immagine di sfondo</span>
            <input id="background-image" type="file" accept="image/*" />
          </label>
          <div class="customization-actions">
            <button id="reset-palette" class="secondary-button" type="button">Colori squadra</button>
            <button id="remove-background" class="secondary-button" type="button">Rimuovi sfondo</button>
          </div>
        </div>
        <small id="customization-status" class="customization-status" aria-live="polite"></small>
      </details>

      <p id="error-message" class="error" role="alert" hidden></p>
    </section>

    <section id="results" class="results" aria-live="polite" hidden>
      <div class="results-header">
        <div>
          <h2 id="round-title">Giornata —</h2>
          <p id="round-subtitle">—</p>
        </div>
        <div id="favorite-summary" class="favorite-summary" hidden>
          <span class="favorite-summary__label">Squadra preferita</span>
          <strong>—</strong>
        </div>
      </div>

      <div id="fixtures-grid" class="fixtures-grid"></div>
    </section>
  </main>

  <footer class="app-footer">
    <span>Fonti: Football-Data.co.uk e Understat.</span>
    <a href="https://github.com/FRAMAX444/serie-a-match-predictor" rel="noreferrer">GitHub</a>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
