<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Pronostici probabilistici per Champions League, Europa League e Conference League, basati sulla forma nazionale ed europea dei club." />
  <title>European Cups Predictor</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="europe.css" />
</head>
<body>
  <main class="page-shell page-shell--predictor">
    <section class="control-bar control-bar--europe" aria-label="Selezione pronostici europei">
      <div class="select-wrap">
        <label class="sr-only" for="competition-select">Competizione europea</label>
        <select id="competition-select" aria-label="Competizione europea"></select>
        <span aria-hidden="true">⌄</span>
      </div>

      <div class="select-wrap">
        <label class="sr-only" for="matchday-select">Turno</label>
        <select id="matchday-select" aria-label="Turno"></select>
        <span aria-hidden="true">⌄</span>
      </div>

      <div class="select-wrap">
        <label class="sr-only" for="favorite-team-select">Squadra evidenziata</label>
        <select id="favorite-team-select" aria-label="Squadra evidenziata"></select>
        <span aria-hidden="true">⌄</span>
      </div>

      <button id="predict-button" class="primary-button" type="button">
        <span>Calcola</span>
        <span aria-hidden="true">→</span>
      </button>

      <a class="icon-button" href="settings.html" aria-label="Impostazioni" title="Impostazioni">⚙</a>
      <p id="error-message" class="error" role="alert" hidden></p>
    </section>

    <section id="results" class="results" aria-live="polite" hidden>
      <div id="fixtures-grid" class="fixtures-grid"></div>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
