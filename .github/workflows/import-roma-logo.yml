name: Import Roma crest

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/import-roma-logo.yml

permissions:
  contents: write

jobs:
  import-logo:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download and validate Roma crest
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p assets/team-logos
          curl --fail --location --retry 3 --retry-delay 2 \
            --user-agent "serie-a-match-predictor/1.0" \
            "https://upload.wikimedia.org/wikipedia/fr/b/b7/Logo_AS_Roma_2026.svg" \
            --output assets/team-logos/roma-2026.svg
          test -s assets/team-logos/roma-2026.svg
          grep -qi '<svg' assets/team-logos/roma-2026.svg

      - name: Point the app to the local asset
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("app.js")
          text = path.read_text(encoding="utf-8")
          old = 'const ROMA_LATEST_LOGO = "https://upload.wikimedia.org/wikipedia/fr/thumb/b/b7/Logo_AS_Roma_2026.svg/240px-Logo_AS_Roma_2026.svg.png";'
          new = 'const ROMA_LATEST_LOGO = "./assets/team-logos/roma-2026.svg";'
          if old not in text:
              raise SystemExit("Roma logo constant not found in app.js")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY

      - name: Remove the one-shot workflow
        shell: bash
        run: rm .github/workflows/import-roma-logo.yml

      - name: Commit to main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.js assets/team-logos/roma-2026.svg .github/workflows/import-roma-logo.yml
          git commit -m "Store Roma 2026 crest locally"
          git push origin HEAD:main
