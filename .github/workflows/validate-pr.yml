name: Validate European predictor

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Validate application
        run: |
          python -m py_compile scripts/update_europe_data.py
          npm test
          npm run check
      - name: Build UEFA dataset from public sources
        run: python scripts/update_europe_data.py --target-season "2627" --history-seasons 3 --skip-understat
