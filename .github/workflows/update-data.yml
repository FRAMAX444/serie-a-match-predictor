name: Update Serie A data

on:
  schedule:
    - cron: "23 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Download recent results and xG
        run: python scripts/update_data.py
      - name: Commit changed dataset
        run: |
          if git diff --quiet -- data/matches.json; then
            echo "No data changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/matches.json
          git commit -m "Update Serie A data"
          git push
