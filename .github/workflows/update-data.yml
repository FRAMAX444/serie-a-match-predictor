name: Update European competition data

on:
  schedule:
    - cron: "23 2,8,14,20 * * *"
  workflow_dispatch:

env:
  TARGET_SEASON: "2627"

permissions:
  contents: write

concurrency:
  group: european-competition-data-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build Big Five and UEFA dataset
        run: python scripts/update_top5_data.py --target-season "$TARGET_SEASON" --history-seasons 4
      - name: Validate generated inputs and model
        run: |
          python -m py_compile scripts/update_europe_data.py scripts/update_uefa_data.py scripts/update_top5_data.py
          npm test
          npm run check
      - name: Commit changed dataset
        run: |
          if git diff --quiet -- data/matches.json; then
            echo "No data changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/matches.json
          git commit -m "Update European predictor data"
          git push
